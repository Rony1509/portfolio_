<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Portfolio</title>
  <base href="/Portfolio_/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <script>
  var ua = navigator.userAgent || '';
  if (/FBAN|FBAV|FB_IAB|FB4A/i.test(ua)) {
    document.addEventListener('DOMContentLoaded', function() {
      var div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;padding:24px;box-sizing:border-box;text-align:center';
      div.innerHTML = '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#007bff" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg><h2 style="margin:16px 0 8px;color:#1a1a1a">Facebook Browser-এ খুলছে না</h2><p style="color:#666;margin:0 0 24px;line-height:1.6">এই লিঙ্কটা কপি করে Chrome বা অন্য browser-এ খুলুন</p><div style="background:#f5f5f5;border-radius:8px;padding:12px 16px;word-break:break-all;color:#007bff;font-size:14px;margin-bottom:24px">' + location.href + '</div><button onclick="navigator.clipboard.writeText(location.href).then(function(){this.textContent=\'✓ Copied!\'},function(){})" style="background:#007bff;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:16px;cursor:pointer">লিঙ্ক কপি করুন</button>';
      document.body.appendChild(div);
    });
  }
</script>

</head>

</body>
</html>
