<section class="achievements" id="achievements" appScrollAnimate>
  <div class="achievements__container">
    <div class="achievements__header">
      <h2 class="achievements__title">Achievements & Certifications</h2>
      <div class="achievements__title-underline"></div>
    </div>

    <div class="achievements__filter">
      <button
        class="achievements__filter-btn"
        [class.active]="selectedFilter() === 'Certification'"
        (click)="setFilter('Certification')"
      >
        Certifications
      </button>
      <button
        class="achievements__filter-btn"
        [class.active]="selectedFilter() === 'Award'"
        (click)="setFilter('Award')"
      >
        Awards & Honors
      </button>
    </div>

    <div class="achievements__grid">
      @for (achievement of filteredAchievements(); track achievement.id) {
        <div class="achievements__card" appScrollAnimate>
          <div class="achievements__icon">
            @if (achievement.type === 'Certification') {
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6.5 2l-3 7h4l3 7h4l3-7h4l-3-7z"></path>
              </svg>
            } @else {
              <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
            }
          </div>

          <h3 class="achievements__card-title">{{ achievement.title }}</h3>
          <p class="achievements__card-org">{{ achievement.organization }}</p>
          <span class="achievements__card-date">{{ achievement.date }}</span>
          <p class="achievements__card-description">{{ achievement.description }}</p>

          <a
            [href]="achievement.certificateUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="achievements__card-link"
          >
            View Certificate →
          </a>
        </div>
      }
    </div>
  </div>
</section>
