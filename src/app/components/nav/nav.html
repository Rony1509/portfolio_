<nav class="nav" [class.scrolled]="isScrolled()">
  <div class="nav__container">
    <div class="nav__logo">
      <a href="#home" class="nav__brand">Md. Rony Rahman</a>
    </div>

    <button class="nav__hamburger" (click)="toggleMobileMenu()" [attr.aria-label]="'Toggle menu'">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav__menu" [class.active]="isMobileMenuOpen()">
      <ul class="nav__links">
        @for (link of navLinks; track link.path) {
          <li>
            <a
              [routerLink]="link.path ? ['/', link.path] : ['/']"
              class="nav__link"
              (click)="closeMobileMenu()"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>
    </div>

    <button class="nav__theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
      @if (theme() === 'light') {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      } @else {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      }
    </button>
  </div>
</nav>
